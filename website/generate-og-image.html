<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }
.card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #5B21B6, #6C2BD9, #7C3AED);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', Arial, Helvetica, sans-serif;
    position: relative;
    overflow: hidden;
}
.circle1 { position: absolute; top: -100px; right: -50px; width: 400px; height: 400px; border-radius: 50%; background: rgba(255,255,255,0.03); }
.circle2 { position: absolute; bottom: -80px; left: -30px; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.03); }
.circle3 { position: absolute; bottom: 50px; right: 150px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.05); }
.logo { font-size: 72px; font-weight: 800; color: white; margin-bottom: 16px; z-index: 1; }
.logo .at { color: #06B6D4; }
.tagline { font-size: 32px; color: rgba(255,255,255,0.85); font-weight: 400; margin-bottom: 24px; z-index: 1; }
.divider { width: 300px; height: 3px; background: linear-gradient(90deg, #06B6D4, #8B5CF6); border-radius: 2px; margin-bottom: 24px; z-index: 1; }
.features { font-size: 22px; color: rgba(255,255,255,0.6); font-weight: 300; margin-bottom: 36px; z-index: 1; letter-spacing: 1px; }
.cta { padding: 16px 48px; background: white; color: #6C2BD9; font-size: 22px; font-weight: 700; border-radius: 28px; z-index: 1; }
.url { position: absolute; bottom: 24px; font-size: 16px; color: rgba(255,255,255,0.35); z-index: 1; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>
    <div class="logo">VOIP<span class="at">@</span> Cloud</div>
    <div class="tagline">Enterprise Cloud PBX Platform</div>
    <div class="divider"></div>
    <div class="features">Smart IVR &nbsp;&bull;&nbsp; Call Recording &nbsp;&bull;&nbsp; SIP Trunking &nbsp;&bull;&nbsp; WebRTC</div>
    <div class="cta">Start Your Free Trial</div>
    <div class="url">www.voipat.com</div>
</div>
</body>
</html>
